name: Tests

on:
  pull_request:
    paths:
      - "custom_components/ha_energy_planner/**"
      - "tests/**"
      - "docs/**"
      - "scripts/**"
      - "README.md"
      - "ha-energy-planner-spec.md"
      - "pyproject.toml"
      - "quality_scale.yaml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/tests.yml"
      - ".github/workflows/quality-scale.yml"
      - ".github/workflows/codespell.yml"
      - ".github/workflows/hassfest.yml"
      - ".github/workflows/validate.yaml"
      - ".github/workflows/release-assets.yml"
  workflow_dispatch:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ format('{0}-{1}', github.workflow_ref || github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  pytest-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Run tests with coverage in Home Assistant Docker
        id: pytest
        continue-on-error: true
        run: >
          docker run --rm
          -e PYTHONDONTWRITEBYTECODE=1
          -v "$PWD:/work"
          -w /work
          ghcr.io/home-assistant/home-assistant:stable
          sh -c 'python3 -m coverage run -m pytest -q
          --junitxml=junit.xml
          -o junit_family=legacy &&
          python3 -m coverage xml -o coverage.xml &&
          python3 -m coverage report -m'
      - name: Upload coverage to Codecov
        if: ${{ always() && hashFiles('coverage.xml') != '' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        if: ${{ always() && hashFiles('junit.xml') != '' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml
          report_type: test_results
      - name: Fail if tests failed
        if: ${{ steps.pytest.outcome == 'failure' }}
        run: exit 1

  quality-scale:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Validate quality scale evidence in Home Assistant Docker
        run: >
          docker run --rm
          -v "$PWD:/work"
          -w /work
          ghcr.io/home-assistant/home-assistant:stable
          python3 scripts/validate_quality_scale.py
      - name: Test quality scale and manifest contracts in Home Assistant Docker
        run: >
          docker run --rm
          -v "$PWD:/work"
          -w /work
          ghcr.io/home-assistant/home-assistant:stable
          python3 -m pytest -q
          tests/scripts/test_validate_quality_scale.py
          tests/test_manifest.py

  docker-validate:
    runs-on: ubuntu-latest
    needs:
      - pytest-coverage
      - quality-scale
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Run Docker validation
        env:
          HEP_SKIP_HA_SMOKE: "1"
        run: scripts/docker-validate.sh
