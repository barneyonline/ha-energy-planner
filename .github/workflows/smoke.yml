name: Home Assistant Smoke

permissions:
  contents: read

on:
  schedule:
    - cron: "37 15 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  home-assistant-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Home Assistant smoke test
        run: scripts/docker-ha-smoke.sh
