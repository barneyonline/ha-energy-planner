levels:
  bronze:
    required:
      - action-setup
      - appropriate-polling
      - brands
      - common-modules
      - config-flow-test-coverage
      - config-flow
      - dependency-transparency
      - docs-actions
      - docs-high-level-description
      - docs-installation-instructions
      - docs-removal-instructions
      - entity-event-setup
      - entity-unique-id
      - has-entity-name
      - runtime-data
      - test-before-configure
      - test-before-setup
      - unique-config-entry
  silver:
    required:
      - action-exceptions
      - config-entry-unloading
      - docs-configuration-parameters
      - docs-installation-parameters
      - entity-unavailable
      - integration-owner
      - log-when-unavailable
      - parallel-updates
      - reauthentication-flow
      - test-coverage
  gold:
    required:
      - devices
      - diagnostics
      - discovery-update-info
      - discovery
      - docs-data-update
      - docs-examples
      - docs-known-limitations
      - docs-supported-devices
      - docs-supported-functions
      - docs-troubleshooting
      - docs-use-cases
      - dynamic-devices
      - entity-category
      - entity-device-class
      - entity-disabled-by-default
      - entity-translations
      - exception-translations
      - icon-translations
      - reconfiguration-flow
      - repair-issues
      - stale-devices
  platinum:
    required:
      - async-dependency
      - inject-websession
      - strict-typing

rules:
  action-setup:
    status: done
    comment: Integration services are registered from async_setup and are covered by service tests and Docker smoke automation.
    references:
      code:
        - custom_components/ha_energy_planner/__init__.py
        - custom_components/ha_energy_planner/services.yaml
        - custom_components/ha_energy_planner/preflight.py
      tests:
        - tests/test_services.py
        - scripts/docker-ha-smoke.sh
  appropriate-polling:
    status: done
    comment: The coordinator schedules wall-clock interval refreshes and explicit decision-input replans, coalesces storms behind a safe minimum interval, and skips unchanged input fingerprints instead of fixed blind polling.
    references:
      code:
        - custom_components/ha_energy_planner/coordinator.py
      tests:
        - tests/test_coordinator.py
  brands:
    status: done
    comment: Custom repository validation tracks the manifest and integration metadata; no upstream brand asset is required for this local custom integration.
    references:
      code:
        - custom_components/ha_energy_planner/manifest.json
      docs:
        - README.md
  common-modules:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/planner.py
        - custom_components/ha_energy_planner/inputs.py
        - custom_components/ha_energy_planner/forecasts.py
        - custom_components/ha_energy_planner/storage.py
        - custom_components/ha_energy_planner/preflight.py
        - custom_components/ha_energy_planner/ev.py
        - custom_components/ha_energy_planner/ev_adapter.py
        - custom_components/ha_energy_planner/number.py
        - custom_components/ha_energy_planner/time.py
      tests:
        - tests/test_planner.py
        - tests/test_inputs.py
        - tests/test_forecasts.py
        - tests/test_storage.py
        - tests/test_services.py
        - tests/test_ev.py
        - tests/test_ev_adapter.py
        - tests/test_ev_control_entities.py
  config-flow-test-coverage:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/config_flow.py
      tests:
        - tests/test_config_flow.py
  config-flow:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/config_flow.py
        - custom_components/ha_energy_planner/manifest.json
      tests:
        - tests/test_config_flow.py
      docs:
        - README.md
  dependency-transparency:
    status: done
    comment: The manifest declares no Python package requirements; Home Assistant APIs and standard-library helpers are used directly.
    references:
      code:
        - custom_components/ha_energy_planner/manifest.json
  docs-actions:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/services.yaml
      docs:
        - README.md
  docs-high-level-description:
    status: done
    references:
      docs:
        - README.md
        - ha-energy-planner-spec.md
  docs-installation-instructions:
    status: done
    references:
      docs:
        - README.md
  docs-removal-instructions:
    status: done
    references:
      docs:
        - README.md
  entity-event-setup:
    status: done
    comment: Entities are coordinator-backed and listeners are owned by the coordinator lifecycle.
    references:
      code:
        - custom_components/ha_energy_planner/entity.py
        - custom_components/ha_energy_planner/coordinator.py
      tests:
        - tests/test_lifecycle.py
  entity-unique-id:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/entity.py
      tests:
        - scripts/docker-ha-smoke.sh
  has-entity-name:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/entity.py
      tests:
        - tests/test_sensor.py
  runtime-data:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/__init__.py
        - custom_components/ha_energy_planner/coordinator.py
      tests:
        - tests/test_lifecycle.py
  test-before-configure:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/config_flow.py
      tests:
        - tests/test_config_flow.py
  test-before-setup:
    status: done
    comment: Config-entry setup loads Store, performs the first coordinator refresh, and restores safe state on setup failure.
    references:
      code:
        - custom_components/ha_energy_planner/__init__.py
      tests:
        - tests/test_lifecycle.py
  unique-config-entry:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/config_flow.py
      tests:
        - tests/test_config_flow.py
  action-exceptions:
    status: done
    comment: Automated execution remains fail-closed and auditable, while explicit services and buttons raise translated Home Assistant errors for missing runtime state or rejected device commands.
    references:
      code:
        - custom_components/ha_energy_planner/__init__.py
        - custom_components/ha_energy_planner/button.py
        - custom_components/ha_energy_planner/executor.py
        - custom_components/ha_energy_planner/ev_adapter.py
        - custom_components/ha_energy_planner/hvac_adapter.py
        - custom_components/ha_energy_planner/enphase_adapter.py
        - custom_components/ha_energy_planner/strings.json
      tests:
        - tests/test_services.py
        - tests/test_switch_button.py
        - tests/test_executor.py
        - tests/test_ev_adapter.py
        - tests/test_hvac_adapter.py
        - tests/test_enphase_adapter.py
  config-entry-unloading:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/__init__.py
      tests:
        - tests/test_lifecycle.py
  docs-configuration-parameters:
    status: done
    references:
      docs:
        - README.md
        - ha-energy-planner-spec.md
  docs-installation-parameters:
    status: done
    references:
      docs:
        - README.md
  entity-unavailable:
    status: done
    comment: Required input health is surfaced as a binary sensor and unsafe inputs block execution.
    references:
      code:
        - custom_components/ha_energy_planner/binary_sensor.py
        - custom_components/ha_energy_planner/inputs.py
      tests:
        - tests/test_binary_sensor.py
        - tests/test_inputs.py
        - tests/fixtures/replay/stale_input_suppresses_control.json
  integration-owner:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/manifest.json
  log-when-unavailable:
    status: done
    comment: Unavailable required inputs and HAEO/service fallback classes are persisted and notified with compact reasons instead of noisy repeated logs.
    references:
      code:
        - custom_components/ha_energy_planner/coordinator.py
        - custom_components/ha_energy_planner/executor.py
      tests:
        - tests/test_executor.py
        - scripts/docker-ha-smoke.sh
  parallel-updates:
    status: done
    comment: Coordinator refreshes are serialized and coalesced with trigger/phase telemetry, while device execution is rate-limited per asset/action kind.
    references:
      code:
        - custom_components/ha_energy_planner/coordinator.py
        - custom_components/ha_energy_planner/executor.py
      tests:
        - tests/test_coordinator.py
        - tests/test_executor.py
  reauthentication-flow:
    status: n/a
    comment: This local-first integration stores entity/service mappings and no remote account credential that requires Home Assistant reauthentication.
    references:
      code:
        - custom_components/ha_energy_planner/config_flow.py
        - custom_components/ha_energy_planner/manifest.json
  test-coverage:
    status: done
    comment: Dockerized pytest, forecast coverage/stitching/gap fixtures, replay fixtures, live-schema fixtures, Recorder history replays, rolling-origin forecast MAE/RMSE and baseline gates, Home Assistant check_config, and Docker smoke are enforced by scripts/docker-validate.sh.
    references:
      tests:
        - tests/test_planner.py
        - tests/test_executor.py
        - tests/test_services.py
        - tests/test_real_history_fixtures.py
        - tests/test_forecast_accuracy.py
        - tests/test_forecasts.py
        - tests/test_inputs.py
      code:
        - scripts/docker-validate.sh
        - scripts/validate-real-history-fixture.py
  devices:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/entity.py
      tests:
        - scripts/docker-ha-smoke.sh
  diagnostics:
    status: done
    comment: Redacted diagnostics include bounded model state, rolling refresh metrics, trigger/coalescing counters, phase timing, usable optimization horizon, and detailed dry-run evidence while recorder-facing sensor attributes use compact summaries.
    references:
      code:
        - custom_components/ha_energy_planner/diagnostics.py
        - custom_components/ha_energy_planner/sensor.py
      tests:
        - tests/test_diagnostics.py
        - tests/test_sensor.py
        - scripts/docker-ha-smoke.sh
  discovery-update-info:
    status: n/a
    comment: The integration is configured explicitly and does not use Home Assistant discovery flows; its internal capability preflight is runtime validation, not device discovery.
    references:
      code:
        - custom_components/ha_energy_planner/discovery.py
        - custom_components/ha_energy_planner/coordinator.py
      tests:
        - tests/test_discovery.py
        - scripts/docker-ha-smoke.sh
  discovery:
    status: n/a
    comment: The integration does not discover devices or services; users explicitly map existing Home Assistant entities and services through config subentries.
    references:
      code:
        - custom_components/ha_energy_planner/discovery.py
      tests:
        - tests/test_discovery.py
  docs-data-update:
    status: done
    references:
      docs:
        - README.md
        - docs/requirements-audit.md
  docs-examples:
    status: done
    references:
      docs:
        - README.md
  docs-known-limitations:
    status: done
    references:
      docs:
        - README.md
        - docs/requirements-audit.md
  docs-supported-devices:
    status: done
    references:
      docs:
        - README.md
        - ha-energy-planner-spec.md
  docs-supported-functions:
    status: done
    references:
      docs:
        - README.md
        - ha-energy-planner-spec.md
  docs-troubleshooting:
    status: done
    references:
      docs:
        - README.md
  docs-use-cases:
    status: done
    references:
      docs:
        - ha-energy-planner-spec.md
  dynamic-devices:
    status: n/a
    comment: Energy Planner exposes a fixed set of configured planner-area helper devices and has no discovered device inventory that can appear dynamically.
    references:
      code:
        - custom_components/ha_energy_planner/entity.py
        - custom_components/ha_energy_planner/coordinator.py
      tests:
        - scripts/docker-ha-smoke.sh
  entity-category:
    status: n/a
    comment: Exposed entities are primary planner control/status entities rather than diagnostic/configuration-only entities.
    references:
      code:
        - custom_components/ha_energy_planner/sensor.py
        - custom_components/ha_energy_planner/binary_sensor.py
        - custom_components/ha_energy_planner/switch.py
        - custom_components/ha_energy_planner/button.py
  entity-device-class:
    status: done
    comment: The estimated-cost sensor uses Home Assistant's monetary device class and configured currency; remaining planner status/confidence entities have no matching device class.
    references:
      code:
        - custom_components/ha_energy_planner/sensor.py
        - custom_components/ha_energy_planner/binary_sensor.py
      tests:
        - tests/test_sensor.py
  entity-disabled-by-default:
    status: n/a
    comment: The integration exposes only core planner status/control entities; no noisy diagnostic entities are created by default.
    references:
      code:
        - custom_components/ha_energy_planner/sensor.py
        - custom_components/ha_energy_planner/binary_sensor.py
        - custom_components/ha_energy_planner/switch.py
        - custom_components/ha_energy_planner/button.py
  entity-translations:
    status: done
    references:
      code:
        - custom_components/ha_energy_planner/strings.json
        - custom_components/ha_energy_planner/translations/en.json
      tests:
        - scripts/docker-ha-smoke.sh
  exception-translations:
    status: done
    comment: Config flows, explicit services, and entity actions use translation keys from strings.json and translations/en.json.
    references:
      code:
        - custom_components/ha_energy_planner/config_flow.py
        - custom_components/ha_energy_planner/__init__.py
        - custom_components/ha_energy_planner/button.py
        - custom_components/ha_energy_planner/strings.json
        - custom_components/ha_energy_planner/translations/en.json
      tests:
        - tests/test_config_flow.py
        - tests/test_services.py
        - tests/test_switch_button.py
  icon-translations:
    status: n/a
    comment: No custom icon translation file is required for the current entity set.
    references:
      code:
        - custom_components/ha_energy_planner/strings.json
  reconfiguration-flow:
    status: done
    comment: Each planning-area config subentry supports Home Assistant's native reconfigure flow, with runtime topology rebuilt after mapping changes.
    references:
      code:
        - custom_components/ha_energy_planner/config_flow.py
      tests:
        - tests/test_config_flow.py
  repair-issues:
    status: n/a
    comment: No issue currently requires a Home Assistant Repairs flow; runtime safety failures are actionable through translated service errors, preflight evidence, and safe-state restoration.
    references:
      code:
        - custom_components/ha_energy_planner/executor.py
      tests:
        - tests/test_executor.py
        - scripts/docker-ha-smoke.sh
  stale-devices:
    status: n/a
    comment: The integration has one config-entry device and no discovered device inventory to prune.
    references:
      code:
        - custom_components/ha_energy_planner/entity.py
  async-dependency:
    status: done
    comment: Integration I/O uses async Home Assistant services, async coordinators, and async HTTP export tooling; there are no synchronous third-party client dependencies.
    references:
      code:
        - custom_components/ha_energy_planner/coordinator.py
        - custom_components/ha_energy_planner/haeo_adapter.py
        - custom_components/ha_energy_planner/ai_advisor.py
  inject-websession:
    status: n/a
    comment: The integration does not maintain an aiohttp API client; external optimization and AI calls are delegated to configured Home Assistant services.
    references:
      code:
        - custom_components/ha_energy_planner/haeo_adapter.py
        - custom_components/ha_energy_planner/ai_advisor.py
  strict-typing:
    status: todo
    comment: Runtime data and public boundaries are annotated, but the complete integration does not yet pass a strict static type checker; this rule is not claimed at the Gold target.
    references:
      code:
        - custom_components/ha_energy_planner/type_defs.py
        - custom_components/ha_energy_planner/__init__.py
        - custom_components/ha_energy_planner/entity.py
        - pyproject.toml
        - scripts/docker-validate.sh
